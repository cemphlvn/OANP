services:
  oanp:
    build: .
    container_name: oanp
    env_file:
      - .env
    ports:
      - "3000:3000"   # Frontend
      - "8123:8123"   # Backend API + WebSocket
    restart: unless-stopped
    volumes:
      - ./results:/app/results
      - ./scenarios:/app/scenarios

  # Optional: Neo4j for knowledge graph memory
