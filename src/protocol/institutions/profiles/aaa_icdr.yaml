institution:
  id: "aaa_icdr"
  name: "American Arbitration Association / ICDR"
  full_name: "American Arbitration Association — International Centre for Dispute Resolution"
  seat: "New York, USA"
  rules_version: "2021"
  rules_effective: "2021-03-01"
  website: "https://www.icdr.org"

procedures:
  standard:
    response_deadline_days: 30           # Art. 2: Notice of Arbitration, 30 days response
    arbitrator_appointment_method: "list_method"  # Art. 13
    award_deadline_days: 60              # Art. 37: 60 days from closing of hearings
    default_arbitrators: 1
    terms_of_reference: false
    scrutiny_of_awards: false
    case_management_conference: true
    electronic_filing: true              # WebFile system

  expedited:
    enabled: true
    rule_reference: "Art. E-1 to E-10"
    threshold_usd: 500000                # Auto-apply for claims under USD 500,000
    auto_apply: true
    opt_in: true
    opt_out: true
    sole_arbitrator: true
    hearing_deadline_days: 60            # Hearing within 60 days of preliminary conference
    hearing_max_days: 1                  # 1 day hearing max
    award_deadline_days: 30              # Award within 30 days after close
    documents_only: false
    reduced_fees: true

  emergency:
    enabled: true
    rule_reference: "Art. 6"
    appointment_business_days: 1         # 1 business day appointment
    decision_days: 14
    form: "order"
    enforceable_as_award: false
    opt_out: true

  mediation:
    enabled: true
    rules: "AAA-ICDR Mediation Rules"
    med_arb: true
    arb_med_arb: false
    integrated_mediation_step: true      # Integrated mediation step

time_limits:
  - phase: "filing"
    action: "notice_of_arbitration"
    article: "Art. 2"
    extendable: false
  - phase: "filing"
    action: "respondent_answer"
    days: 30
    article: "Art. 2"
    extendable: true
  - phase: "constitution"
    action: "arbitrator_appointment"
    method: "list_method"
    article: "Art. 13"
    extendable: false
  - phase: "emergency"
    action: "emergency_arbitrator_appointment"
    business_days: 1
    article: "Art. 6"
    extendable: false
  - phase: "emergency"
    action: "emergency_decision"
    days: 14
    article: "Art. 6"
    extendable: false
  - phase: "expedited"
    action: "hearing"
    days: 60
    article: "Art. E-5"
    from_event: "preliminary_conference"
  - phase: "expedited"
    action: "hearing_duration"
    max_days: 1
    article: "Art. E-6"
  - phase: "expedited"
    action: "render_award"
    days: 30
    article: "Art. E-9"
    from_event: "close_of_hearing"
    extendable: true
  - phase: "award"
    action: "render_award"
    days: 60
    article: "Art. 37"
    from_event: "close_of_hearings"
    extendable: true
    extendable_by: "administrator"
    condition: "standard_only"

fees:
  filing_usd: 2300
  fee_model: "ad_valorem"
  fee_schedule: "sliding_scale"
  expedited_reduced: true
  electronic_filing_platform: "WebFile"

due_process:
  equal_treatment: true
  right_to_be_heard: true
  right_to_present_case: true
  language_requirements: true
  arbitrator_disclosure: "iba_guidelines"
  confidentiality: "default_confidential"
  challenge_period_days: 15

award_requirements:
  writing: true
  signatures: "all_or_majority_with_reason"
  reasons: true
  date: true
  seat: true
  delivery: "signed_copy_to_each_party"
  scrutiny: false
  correction_deadline_days: 30

enforcement:
  new_york_convention: true
  singapore_convention: false
  electronic_signatures: "accepted"
  electronic_filing: true
  platform: "WebFile"

# OANP protocol mapping
oanp_mapping:
  phase_round_limits:
    discovery: 4
    generation: 3
    bargaining: 10
    convergence: 5
  escalation_tiers:
    - tier: "negotiation"
      max_rounds: 10
    - tier: "mediation"
      max_rounds: 6
      notes: "Integrated mediation step"
    - tier: "arbitration"
      max_rounds: 4
  hard_deadline_rounds: 25
  stagnation_window: 3
  stagnation_threshold: 0.02
