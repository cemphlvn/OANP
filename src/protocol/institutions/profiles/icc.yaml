institution:
  id: "icc"
  name: "International Chamber of Commerce"
  full_name: "ICC International Court of Arbitration"
  seat: "Paris, France"
  rules_version: "2021"
  rules_effective: "2021-01-01"
  website: "https://iccwbo.org"

procedures:
  standard:
    response_deadline_days: 30           # Art. 5.1
    arbitrator_appointment_days: 30      # Art. 12.5
    award_deadline_months: 6             # Art. 24 (from Terms of Reference)
    default_arbitrators: 1               # Art. 12.2 (sole unless warranted)
    terms_of_reference: true             # Unique to ICC
    scrutiny_of_awards: true             # Art. 34
    case_management_conference: true     # Art. 22

  expedited:
    enabled: true
    threshold_usd: 3000000               # Art. 30 / Appendix VI
    auto_apply: true
    opt_in: true
    opt_out: true
    sole_arbitrator: true
    award_deadline_months: 6             # From CMC
    cmc_deadline_days: 15                # From file transmission
    documents_only: true
    no_terms_of_reference: true
    reduced_fees: true

  emergency:
    enabled: true
    rule_reference: "Art. 29 + Appendix V"
    appointment_hours: 48
    decision_days: 15
    form: "order"
    enforceable_as_award: false
    applies_from: "2012-01-01"
    opt_out: true

  mediation:
    enabled: true
    rules: "ICC Mediation Rules 2014"
    med_arb: false
    arb_med_arb: false

time_limits:
  - phase: "filing"
    action: "respondent_answer"
    days: 30
    article: "Art. 5.1"
    extendable: true
  - phase: "constitution"
    action: "co_arbitrator_appoint_president"
    days: 30
    article: "Art. 12.5"
    extendable: false
  - phase: "proceedings"
    action: "case_management_conference"
    days: 15
    article: "Appendix VI"
    condition: "expedited_only"
  - phase: "proceedings"
    action: "terms_of_reference"
    days: 60
    article: "Art. 23.1"
    from_event: "file_transmission"
    condition: "standard_only"
  - phase: "award"
    action: "render_award"
    months: 6
    article: "Art. 24"
    from_event: "terms_of_reference"
    extendable: true
    extendable_by: "court"

fees:
  registration_usd: 5000
  fee_model: "ad_valorem"
  max_admin_usd: 150000
  expedited_reduced: true

due_process:
  equal_treatment: true
  right_to_be_heard: true
  right_to_present_case: true
  language_requirements: true
  arbitrator_disclosure: "iba_guidelines"
  confidentiality: "default_confidential"
  challenge_period_days: 30

award_requirements:
  writing: true
  signatures: "all_or_majority_with_reason"
  reasons: true
  date: true
  seat: true
  delivery: "signed_copy_to_each_party"
  scrutiny: true
  correction_deadline_days: 30

enforcement:
  new_york_convention: true
  singapore_convention: false
  electronic_signatures: "accepted"
  electronic_filing: true
  platform: "ICC Case Connect"

# OANP protocol mapping
oanp_mapping:
  phase_round_limits:
    discovery: 4
    generation: 3
    bargaining: 10
    convergence: 5
  escalation_tiers:
    - tier: "negotiation"
      max_rounds: 10
    - tier: "mediation"
      max_rounds: 6
    - tier: "arbitration"
      max_rounds: 4
  hard_deadline_rounds: 25
  stagnation_window: 3
  stagnation_threshold: 0.02
