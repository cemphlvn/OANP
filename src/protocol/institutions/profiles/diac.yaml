institution:
  id: "diac"
  name: "Dubai International Arbitration Centre"
  full_name: "Dubai International Arbitration Centre"
  seat: "Dubai, United Arab Emirates"
  rules_version: "2022"
  rules_effective: "2022-03-21"
  website: "https://www.diac.ae"

procedures:
  standard:
    response_deadline_days: 30
    arbitrator_appointment_days: 30
    award_deadline_months: null          # No fixed standard deadline
    default_arbitrators: 1
    terms_of_reference: false
    scrutiny_of_awards: false
    case_management_conference: true
    electronic_first: true               # Art. 3: electronic-first filing

  expedited:
    enabled: true
    rule_reference: "Art. 32"
    threshold_aed: 1000000               # AED 1M
    auto_apply: true
    opt_in: true
    opt_out: true
    sole_arbitrator: true
    sole_arb_appointment_days: 5
    award_deadline_months: 3
    reduced_fees: true

  emergency:
    enabled: true
    rule_reference: "Art. 33"
    appointment_days: 1                  # 1 day appointment
    decision_days: 14
    form: "order"
    enforceable_as_award: false
    opt_out: true

  mediation:
    enabled: true
    rules: "DIAC Mediation Rules"
    med_arb: false
    arb_med_arb: false

time_limits:
  - phase: "filing"
    action: "respondent_response"
    days: 30
    article: "Art. 5"
    extendable: true
  - phase: "constitution"
    action: "arbitrator_appointment"
    days: 30
    article: "Art. 10"
    extendable: false
  - phase: "emergency"
    action: "emergency_arbitrator_appointment"
    days: 1
    article: "Art. 33"
    extendable: false
  - phase: "emergency"
    action: "emergency_decision"
    days: 14
    article: "Art. 33"
    extendable: false
  - phase: "expedited"
    action: "sole_arbitrator_appointment"
    days: 5
    article: "Art. 32"
    extendable: false
  - phase: "expedited"
    action: "render_award"
    months: 3
    article: "Art. 32"
    extendable: true
    extendable_by: "diac"

fees:
  registration_aed: 5000
  fee_model: "ad_valorem"
  expedited_reduced: true

due_process:
  equal_treatment: true
  right_to_be_heard: true
  right_to_present_case: true
  language_requirements: true
  arbitrator_disclosure: "iba_guidelines"
  confidentiality: "default_confidential"
  challenge_period_days: 15
  electronic_first: true                 # Art. 3

award_requirements:
  writing: true
  signatures: "all_or_majority_with_reason"
  reasons: true
  date: true
  seat: true
  delivery: "electronic_delivery"
  scrutiny: false
  correction_deadline_days: 30

enforcement:
  new_york_convention: true
  singapore_convention: false
  electronic_signatures: "accepted"
  electronic_filing: true
  platform: "DIAC e-Filing"

# OANP protocol mapping
oanp_mapping:
  phase_round_limits:
    discovery: 4
    generation: 3
    bargaining: 10
    convergence: 5
  escalation_tiers:
    - tier: "negotiation"
      max_rounds: 10
    - tier: "mediation"
      max_rounds: 6
    - tier: "arbitration"
      max_rounds: 4
  hard_deadline_rounds: 25
  stagnation_window: 3
  stagnation_threshold: 0.02
